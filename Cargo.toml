[package]
name = "unlimited"
version = "0.0.5-dev"
authors = ["Carl-Erwin Griffith <carl.erwin@gmail.com>"]
edition = "2018"

[[bin]]
doc = false
name = "unlimited"
path = "src/main.rs"


[[bin]]
doc = false
name = "crossterm-test"
path = "test-tools/crossterm-input-test.rs"


[dependencies]
libc = "*"
rand = "*"

clap = "*"

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

termion = "*"
ncurses = "*"
crossterm = "0.17"

[profile.release]
#lto = true
debug = true
opt-level = 3
panic = "abort"


[profile.dev]
panic = "abort"
